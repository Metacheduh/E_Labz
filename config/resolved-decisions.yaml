# Resolved Decisions — Always check this first in every new conversation
# This file prevents re-flagging issues that have already been solved.
# Updated: 2026-03-19

posting_method:
  decision: "Browser-based posting is the primary method"
  date: "2026-03-18"
  context: "Twitter API returns 402 (credits exhausted). Browser poster handles all posting."
  resolved: true
  details: "browser_poster.py uses Puppeteer to post tweets and replies directly. Works reliably."

twitter_api:
  decision: "Twitter API is only used for free-tier profile reads (follower count, post count)"
  date: "2026-03-18"
  context: "402 Payment Required on write endpoints. $200/mo Basic tier not worth it at 167 followers."
  resolved: true
  revisit_at: "1000+ followers"

engagement_tracking:
  decision: "Use follower growth rate as proxy for engagement metrics"
  date: "2026-03-18"
  context: "Per-tweet analytics (impressions, likes) are paywalled. Follower delta is the KPI."
  resolved: true
  details: "sync_metrics.py syncs profile data + Stripe into local DB. Follower growth = primary signal."

typefully:
  decision: "Typefully was never used for actual posting. 1,184 posts came from browser poster."
  date: "2026-03-18"
  context: "Typefully API key works but analytics API does not exist. Not useful for our needs."
  resolved: true

