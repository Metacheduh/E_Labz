# === New decisions from codebase review (2026-03-19) ===

posting_priority_enforced:
  decision: "twitter.py now tries Browser first, Typefully second — code matches decision"
  date: "2026-03-19"
  context: "Previously, code tried Typefully first despite browser-first decision. Fixed posting order in post_tweet() and post_thread()."
  resolved: true

research_pipeline_wired:
  decision: "Research output now feeds the posting pipeline via tweet_cache.json"
  date: "2026-03-19"
  context: "run_research() calls research_to_tweet_ideas() and caches results. _pick_unique() checks cache before static pool."
  resolved: true
  details: "Cache at output/research/tweet_cache.json. Static 20-tweet pool is now fallback, not primary."

humanizer_never_drops:
  decision: "publish() never returns None — posts with warning instead of silently dropping"
  date: "2026-03-19"
  context: "3/13 posts were silently dropped on Day 2 because humanization failed. Now publishes anyway with ⚠️ HUMANIZATION_WEAK warning."
  resolved: true

tweepy_import_guarded:
  decision: "tweepy import is wrapped in try/except — module loads without tweepy installed"
  date: "2026-03-19"
  context: "Prevents import cascade crashes when tweepy isn't installed or API keys are missing."
  resolved: true

agent_py_deprecated:
  decision: "agent.py is marked DEPRECATED — scheduler calls modules directly"
  date: "2026-03-19"
  context: "Was dead code with TODO stubs. Kept for reference but clearly marked as unused."
  resolved: true
