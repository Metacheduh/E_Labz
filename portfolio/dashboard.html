<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Labz Swarm | Analytics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-container { padding: 40px; max-width: 1200px; margin: 0 auto; z-index: 10; position: relative; }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .metric-card { padding: 40px; text-align: center; }
        .metric-card h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .chart-card { min-height: 400px; padding: 24px; }
        canvas { width: 100% !important; height: 350px !important; }
    </style>
</head>
<body>
    <div id="aurora">
        <div class="aurora-orb"></div>
        <div class="aurora-orb"></div>
    </div>
    
    <nav class="nav">
        <a href="index.html" class="nav-logo">⚡ E-Labz</a>
        <div class="nav-links">
            <a href="index.html#projects">Work</a>
            <a href="index.html#marketplace">Store</a>
        </div>
        <span class="nav-cta">LIVE METRICS</span>
    </nav>

    <div class="dashboard-container">
        <div class="metrics-grid">
            <div class="glass-card metric-card">
                <span class="stat-label">Followers</span>
                <h1 id="total-followers" class="gradient-text">--</h1>
                <span id="follower-growth" class="swarm-status">+0 today</span>
            </div>
            <div class="glass-card metric-card">
                <span class="stat-label">Revenue (30d)</span>
                <h1 id="total-revenue" class="gradient-text">$0.00</h1>
                <span id="sales-count" class="swarm-status">0 sales</span>
            </div>
            <div class="glass-card metric-card">
                <span class="stat-label">Posts Published</span>
                <h1 id="total-posts" class="gradient-text">--</h1>
                <span class="swarm-status">100% Autonomous</span>
            </div>
        </div>

        <div class="charts-grid">
            <div class="glass-card chart-card">
                <h3>Follower Growth</h3>
                <canvas id="followerChart"></canvas>
            </div>
            <div class="glass-card chart-card">
                <h3>Revenue Performance</h3>
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        async function fetchMetrics() {
            try {
                const resp = await fetch('http://localhost:8080/api/metrics');
                const data = await resp.json();
                
                if (data.current) {
                    document.getElementById('total-followers').innerText = (data.current.follower_total || 169).toLocaleString();
                    document.getElementById('follower-growth').innerText = `+${data.current.follower_growth || 0} today`;
                    document.getElementById('total-posts').innerText = (data.current.posts_published || 1208).toLocaleString();
                }

                if (data.revenue) {
                    document.getElementById('total-revenue').innerText = `$${(data.revenue.total_revenue || 0).toFixed(2)}`;
                    document.getElementById('sales-count').innerText = `${data.revenue.total_sales || 0} sales (Projected: $${data.revenue.projected_monthly || 0})`;
                    
                    if (data.revenue.on_track) {
                        document.getElementById('sales-count').style.color = '#06d6a0';
                        document.getElementById('sales-count').innerHTML += ' • <span style="font-weight:bold;">ON TRACK</span>';
                    }
                }
                
                if (data.history) {
                    renderCharts(data.history);
                }
            } catch (e) {
                console.error("Dashboard API not running, using mock data", e);
                // Fallback for visual demo
                document.getElementById('total-followers').innerText = "169";
                document.getElementById('total-posts').innerText = "1,208";
                renderCharts([
                    {timestamp: "2026-03-20", followers: 160, revenue_today: 0},
                    {timestamp: "2026-03-21", followers: 162, revenue_today: 0},
                    {timestamp: "2026-03-22", followers: 165, revenue_today: 0},
                    {timestamp: "2026-03-23", followers: 168, revenue_today: 0},
                    {timestamp: "2026-03-24", followers: 169, revenue_today: 0}
                ]);
            }
        }

        function renderCharts(history) {
            const labels = history.map(d => d.timestamp.split('T')[0]);
            
            // Follower Chart
            new Chart(document.getElementById('followerChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Followers',
                        data: history.map(d => d.followers),
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139,92,246,0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { scales: { y: { beginAtZero: false } } }
            });

            // Revenue Chart
            new Chart(document.getElementById('revenueChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Revenue ($)',
                        data: history.map(d => d.revenue_today || 0),
                        backgroundColor: '#06d6a0',
                        borderRadius: 8
                    }]
                }
            });
        }

        fetchMetrics();
    </script>
</body>
</html>
